name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  docs_consistency:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.12'
    - name: Instantiate Julia project
      run: julia --project=./julia -e 'using Pkg; Pkg.instantiate()'
    - name: Verify README consistency
      run: scripts/check_readme_consistency.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-fmt
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Install rustfmt
      run: rustup component add rustfmt
    - name: Format check
      run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-clippy
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Install clippy
      run: rustup component add clippy
    - name: Clippy fail-closed
      run: cargo clippy --all-targets --all-features -- -D warnings

  engine_boundaries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-engine-boundaries
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Fail if forbidden patterns enter engine
      run: |
        set -euo pipefail
        prohibited=(
          "std::time"
          "std::fs"
          "std::net"
          "rand"
          "HashMap"
          "HashSet"
          "tracing"
          "log::"
          "std::env"
        )
        for token in "${prohibited[@]}"; do
          if grep -RIn --fixed-strings --exclude-dir=target --exclude-dir=.git --color=never "$token" src/engine/; then
            echo "Forbidden token '$token' found in src/engine"
            exit 1
          fi
        done
        echo "Engine boundary check passed"
    - name: Engine determinism and trace-contract tests
      run: |
        for test_name in aml_trace_contract_approved aml_trace_contract_flagged aml_trace_contract_blocked decision_trace_contract_is_stable_golden evaluate_reproducible_for_identical_input; do
          cargo test -q "$test_name"
        done
        for test_name in aml_trace_contract_approved aml_trace_contract_flagged aml_trace_contract_blocked decision_trace_contract_is_stable_golden evaluate_reproducible_for_identical_input; do
          cargo test --features network -q "$test_name"
        done

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-security
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Install cargo-deny
      uses: taiki-e/install-action@cargo-deny
    - name: cargo-deny check
      run: cargo deny check

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-build
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Setup Zig 0.11.0 (offline audit verifier)
      uses: mlugg/setup-zig@v1
      with:
        version: 0.11.0
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.12'
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run tests (network feature)
      run: cargo test --features network --verbose
    - name: Run Julia tests
      run: |
        julia --project=./julia -e 'using Pkg; Pkg.instantiate()'
        julia --project=./julia julia/test/runtests.jl
    - name: Run Julia integration test (bridge -> API)
      run: julia --project=./julia julia/test_integration.jl
    - name: Verify audit hash offline (Zig)
      run: |
        cd tools/zig
        zig build test
        zig build run -- verify ../../fixtures/audit_sample.jsonl
    - name: Verify Rust-generated audit artifact offline (Zig)
      run: |
        tmp_audit="$(mktemp /tmp/nexo-zig-runtime-XXXXXX.jsonl)"
        cargo run --quiet --bin gen_zig_fixtures
        cp fixtures/audit_rust_blake3.jsonl "$tmp_audit"
        cd tools/zig
        zig build run -- verify "$tmp_audit"

  bench:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-bench
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
          ${{ runner.os }}-cargo-
    - name: Enforce perf budget
      run: cargo run --release --bin perf_budget
    - name: Continuous load test
      run: |
        NEXO_LOAD_REQUESTS=600 \
        NEXO_LOAD_CONCURRENCY=60 \
        NEXO_LOAD_MAX_P95_US=400 \
        NEXO_LOAD_MAX_P99_US=1200 \
        NEXO_ALERT_MAX_ERROR_RATE_PCT=0.00 \
        NEXO_ALERT_MAX_401=0 \
        NEXO_ALERT_MAX_408=0 \
        NEXO_ALERT_MAX_409=0 \
        NEXO_ALERT_MAX_429=0 \
        cargo run --release --bin load_test | tee bench_load_test.log
    - name: Bench summary
      if: always()
      run: |
        echo "## Bench Operational Summary" >> "$GITHUB_STEP_SUMMARY"
        if [ -f bench_load_test.log ]; then
          grep -E "^(load_test|ok_responses|latency_us|ops_metrics)" bench_load_test.log >> "$GITHUB_STEP_SUMMARY" || true
        else
          echo "bench_load_test.log not found" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload bench log artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bench-load-test-log
        path: bench_load_test.log
        if-no-files-found: warn
